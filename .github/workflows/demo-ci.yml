name: demo-ci

# Rebuilds the interactive dashboard from the live pipeline output and checks it is populated
# and self-contained (no external network dependency). Keeps docs/index.html from drifting.

on:
  push:
    branches: ["**"]
    paths: ["demo/**", "graph/**", "retrieval/**", "analogy/**", "grounding/**", "docs/**", ".github/workflows/demo-ci.yml"]
  pull_request:
    paths: ["demo/**", "graph/**", "retrieval/**", "analogy/**", "grounding/**", "docs/**", ".github/workflows/demo-ci.yml"]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install pytest
        run: python -m pip install --upgrade pip pytest
      - name: Rebuild the dashboard from live output
        run: PYTHONPATH=graph/src:retrieval/src:analogy/src:grounding/src python demo/build_demo.py
      - name: Tests (model in sync + dashboard self-contained)
        run: PYTHONPATH=graph/src:retrieval/src:analogy/src:grounding/src python -m pytest demo/test_demo.py -q
      - name: Fail if docs/index.html is stale (out of sync with committed sources)
        run: git diff --exit-code docs/index.html
