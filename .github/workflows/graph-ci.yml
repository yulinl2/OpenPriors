name: graph-ci

# Verifies the unified (object, attribute, relation) graph store: reification is lossless,
# the project's questions are graph traversals, and the graph round-trips through JSONL.
# Pure-Python (analogy + retrieval + grounding via PYTHONPATH).

on:
  push:
    branches: ["**"]
    paths: ["graph/**", "retrieval/**", "analogy/**", "grounding/**", ".github/workflows/graph-ci.yml"]
  pull_request:
    paths: ["graph/**", "retrieval/**", "analogy/**", "grounding/**", ".github/workflows/graph-ci.yml"]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install pytest
        run: python -m pip install --upgrade pip pytest
      - name: Build unified graph + example queries (gates its own invariants)
        run: PYTHONPATH=graph/src:retrieval/src:analogy/src:grounding/src python -m graphstore.cli
      - name: Cross-domain analogy edges over two literatures (gates invariants)
        run: PYTHONPATH=graph/src:retrieval/src:analogy/src:grounding/src python -m graphstore.crossdomain
      - name: Unsupervised role-ascension discovery over three literatures (gates invariants)
        run: PYTHONPATH=graph/src:retrieval/src:analogy/src:grounding/src python -m graphstore.multidomain
      - name: Analogical inference transfer — generate conjectures (gates invariants)
        run: PYTHONPATH=graph/src:retrieval/src:analogy/src:grounding/src python -m graphstore.transfer_cli
      - name: Conjecture evaluation gate (deterministic check of the sub-agent judgment)
        run: PYTHONPATH=graph/src:retrieval/src:analogy/src:grounding/src python -m graphstore.evaluate
      - name: Discovery gate (research directions refined from the open conjectures)
        run: PYTHONPATH=graph/src:retrieval/src:analogy/src:grounding/src python -m graphstore.discover
      - name: Numerical experiment for research direction C2 (finite-MDP contraction modulus)
        run: PYTHONPATH=graph/src python -m graphstore.experiment_c2
      - name: Numerical experiment for research direction C4 (fixed-point uniform convergence, EM)
        run: PYTHONPATH=graph/src python -m graphstore.experiment_c4
      - name: Numerical experiment for research direction C5 (OGD phase diagram vs spectral radius)
        run: PYTHONPATH=graph/src python -m graphstore.experiment_c5
      - name: End-to-end pipeline (capstone — ingest→lineage→analogy→transfer→evaluate)
        run: PYTHONPATH=graph/src:retrieval/src:analogy/src:grounding/src python -m graphstore.pipeline
      - name: Query DSL over the unified graph (path / ancestor / analogy / conjecture lookup)
        run: PYTHONPATH=graph/src:retrieval/src:analogy/src:grounding/src python -m graphstore.dsl_cli
      - name: Second real paper end-to-end (Nesterov acceleration)
        run: PYTHONPATH=graph/src:retrieval/src:analogy/src:grounding/src python -m graphstore.realpaper2
      - name: Formal schema — emit + validate the unified graph
        run: PYTHONPATH=graph/src:retrieval/src:analogy/src:grounding/src python -m graphstore.schema
      - name: Tests
        run: PYTHONPATH=graph/src:retrieval/src:analogy/src:grounding/src python -m pytest graph/tests -q
