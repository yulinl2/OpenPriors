name: graph-ci

# Verifies the unified (object, attribute, relation) graph store: reification is lossless,
# the project's questions are graph traversals, and the graph round-trips through JSONL.
# Pure-Python (analogy + retrieval + grounding via PYTHONPATH).

on:
  push:
    branches: ["**"]
    paths: ["graph/**", "retrieval/**", "analogy/**", "grounding/**", ".github/workflows/graph-ci.yml"]
  pull_request:
    paths: ["graph/**", "retrieval/**", "analogy/**", "grounding/**", ".github/workflows/graph-ci.yml"]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install pytest
        run: python -m pip install --upgrade pip pytest
      - name: Build unified graph + example queries (gates its own invariants)
        run: PYTHONPATH=graph/src:retrieval/src:analogy/src:grounding/src python -m graphstore.cli
      - name: Cross-domain analogy edges over two literatures (gates invariants)
        run: PYTHONPATH=graph/src:retrieval/src:analogy/src:grounding/src python -m graphstore.crossdomain
      - name: Tests
        run: PYTHONPATH=graph/src:retrieval/src:analogy/src:grounding/src python -m pytest graph/tests -q
